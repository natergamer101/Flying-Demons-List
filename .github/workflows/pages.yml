name: Build and Deploy Static Site

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize database
        run: |
          export FLASK_APP=run.py
          export FLASK_ENV=development
          # migrations folder may not exist in this repository; ignore failures
          flask db upgrade || true
          flask seed-levels || true
          python - <<'PYCODE'
from app import db
from app.models import User, Claim, Level
from datetime import datetime
# ensure tables exist and at least one level row
with db.app.app_context():
    db.create_all()

if not User.query.filter_by(username='demo').first():
    u = User(username='demo', email='demo@example.com')
    u.set_password('password')
    db.session.add(u)
    db.session.commit()
else:
    u = User.query.filter_by(username='demo').first()
level = Level.query.first()
if level and u:
    if not Claim.query.filter_by(user_id=u.id, level_id=level.id).first():
        c = Claim(user_id=u.id, level_id=level.id, youtube_link='https://youtu.be/dQw4w9WgXcQ', status='approved', submitted_at=datetime.utcnow())
        db.session.add(c)
        db.session.commit()
PYCODE

      - name: Freeze static site
        run: |
          export FLASK_APP=run.py
          export FLASK_ENV=development
          export FREEZER_BASE_URL=https://natergamer101.github.io/Flying-Demons-List/
          flask freeze
          touch build/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
