name: Build and Deploy Static Site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare environment variables
        run: |
          echo "FLASK_APP=run.py" >> $GITHUB_ENV
          echo "FLASK_ENV=development" >> $GITHUB_ENV
          # use local sqlite so we don't need Postgres on the runner
          echo "DEV_DATABASE_URL=sqlite:///app.db" >> $GITHUB_ENV
          # compute a reasonable FREEZER_BASE_URL for project pages
          echo "FREEZER_BASE_URL=https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY##*/}/" >> $GITHUB_ENV

      - name: Initialize database
        run: |
          flask db upgrade
          flask seed-levels
          # add one demo user and claim so the freeze output isn't empty
          python - <<'PYCODE'
from app import db
from app.models import User, Claim, Level
from datetime import datetime
if not User.query.filter_by(username='demo').first():
    u = User(username='demo', email='demo@example.com')
    u.set_password('password')
    db.session.add(u)
    db.session.commit()
else:
    u = User.query.filter_by(username='demo').first()
level = Level.query.first()
if level and u:
    if not Claim.query.filter_by(user_id=u.id, level_id=level.id).first():
        c = Claim(user_id=u.id, level_id=level.id, youtube_link='https://youtu.be/dQw4w9WgXcQ', status='approved', submitted_at=datetime.utcnow())
        db.session.add(c)
        db.session.commit()
PYCODE

      - name: Freeze static site
        run: |
          flask freeze

      - name: Configure Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
